# @format

name: Validate Pull Request

on:
  pull_request:
    types:
      - review_requested

env:
  COMPOSER_CACHE_DIR: ~/.composer/cache
  NODE_ENV: test

jobs:
  validate-php-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Reviewdog
        uses: reviewdog/action-setup@v1
        with:
          reviewdog_version: v0.20.3

      - name: Set up PHP toolchain
        id: setup-php
        uses: tomgrv/actions/setup-php@v0

      - name: Validate composer
        uses: tomgrv/actions/check-composer@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run PHP Insights
        uses: tomgrv/actions/run-phpinsights@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          paths: app,config,database,resources,routes,tests,modules,packages

      - name: Run PHPMD
        uses: tomgrv/actions/run-phpmd@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          paths: app,config,database,resources,routes,tests,modules,packages
          priority: min

  run-php-tests:
    runs-on: ubuntu-latest
    needs:
      - validate-php-code

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    env:
      DB_CONNECTION: mysql
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: testing
      DB_USERNAME: root
      DB_PASSWORD: ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Pest/PHPUnit tests
        id: tests
        uses: tomgrv/actions/run-phptests@v0
