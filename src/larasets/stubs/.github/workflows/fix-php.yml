# @format

name: Fix PHP Insights

on:
  workflow_dispatch:
    inputs:
      paths:
        description: Comma-separated paths to auto-fix.
        required: false
        default: app,config,database,resources,routes,tests,modules,packages
      base_branch:
        description: Base branch for the pull request.
        required: false
        default: develop

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-phpinsights:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure Bot
        id: config-bot
        uses: tomgrv/actions/config-bot@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up PHP toolchain
        uses: tomgrv/actions/setup-php@v0

      - name: Apply PHPStan fixes
        id: fix-phpstan
        uses: ./packages/tomgrv/actions/run-phpstan
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          paths: ${{ github.event.inputs.paths }}
          fix: 'true'

      - name: Apply FilaCheck fixes
        id: fix-filacheck
        uses: tomgrv/actions/run-filacheck@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: app/Filament
          fix: 'true'

      - name: Apply Pint fixes
        id: fix-pint
        uses: ./packages/tomgrv/actions/run-pint
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          paths: ${{ github.event.inputs.paths }}
          fix: 'true'

      - name: Create or update PR
        id: create-pr
        if: ${{ steps.fix-phpstan.outputs.has-changes == 'true' || steps.fix-filacheck.outputs.has-changes == 'true' || steps.fix-pint.outputs.has-changes == 'true' }}
        uses: tomgrv/actions/create-pr@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          head-branch: 'chore/phpinsights-fix-${{ github.run_id }}'
          workdir: ${{ github.workspace }}
          commit-message: 'chore: apply PHP Insights auto-fixes'
          head-owner: ${{ github.repository_owner }}
          base-branch: ${{ github.event.inputs.base_branch }}
          pr-title: 'chore: apply PHP Insights auto-fixes'
          pr-body: |
            Automated PHP Insights fixes generated by CI.

            ${{ steps.fix-phpstan.outputs.pr_body }}

            ${{ steps.fix-pint.outputs.pr_body }}

            ---
            _This PR was created by the `tomgrv/fix-phpinsights` workflow, which runs PHP Insights with auto-fix enabled. If you want to adjust the paths or base branch for future runs, you can trigger the workflow manually from the Actions tab._
