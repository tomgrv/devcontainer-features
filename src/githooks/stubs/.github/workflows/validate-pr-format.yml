# @format

name: Validate PR Title

on:
  pull_request:
    types: [review_requested]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: npm ci && npm install -D $(jq -r '.commitlint.extends//""' 'package.json' | tr -d "'[]:,\"")

      - name: Validate PR title format
        run: echo "${{ github.event.pull_request.title }}" | npx commitlint

      - name: Validate and update PR title if needed
        # Only attempt to edit the PR title for same-repo PRs; fork PRs have a
        # read-only GITHUB_TOKEN that cannot update pull request metadata.
        if: github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"
          # Use devmoji to get the formatted title
          FORMATTED_TITLE=$(npx --yes devmoji --text "$PR_TITLE")
          # If devmoji added an emoji, it means the original didn't have one
          if [ "$PR_TITLE" != "$FORMATTED_TITLE" ]; then
            echo "❌ PR title is missing an emoji or not formatted correctly."
            echo "Original: $PR_TITLE"
            echo "Expected: $FORMATTED_TITLE"
            echo "Updating PR title..."
            # Update the PR title (GH_TOKEN is already in the environment, no need to gh auth login)
            gh pr edit "$PR_NUMBER" --repo "$REPO" --title "$FORMATTED_TITLE"
            echo "✅ PR title updated to: $FORMATTED_TITLE"
          else
            echo "✅ PR title contains an emoji and is formatted correctly!"
          fi
