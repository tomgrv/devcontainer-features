# @format

name: Validate PR Title

on:
  pull_request:
    types: [review_requested]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate PR title
        uses: tomgrv/actions/check-pr-format@v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
